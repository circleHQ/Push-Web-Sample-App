<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Circle Push — Sample</title>
    <style>
      :root { color-scheme: light dark; font-family: ui-sans-serif, system-ui, sans-serif; }
      body { max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
      h1 { margin: 0 0 1rem; }
      .row { display: flex; gap: .5rem; flex-wrap: wrap; margin: .5rem 0 1rem; }
      button {
        padding: .55rem 1rem; border: 1px solid #888; border-radius: .375rem;
        background: #f7f7f7; cursor: pointer; font: inherit;
      }
      button:hover { background: #ececec; }
      button:disabled { opacity: .5; cursor: not-allowed; }
      input, textarea {
        width: 100%; padding: .5rem; border: 1px solid #888; border-radius: .375rem;
        font: inherit; box-sizing: border-box;
      }
      textarea { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      label { display: block; margin: .5rem 0 .25rem; font-weight: 600; }
      .panel {
        background: #f4f4f4; border: 1px solid #ddd; padding: .75rem; border-radius: .5rem;
        margin: 1rem 0;
      }
      .grid { display: grid; grid-template-columns: max-content 1fr; gap: .25rem 1rem; }
      .grid b { color: #555; }
      pre {
        background: #111; color: #eee; padding: .75rem; border-radius: .5rem;
        max-height: 320px; overflow: auto; font-size: 12px;
      }
      .muted { color: #666; font-size: .9rem; }
      @media (prefers-color-scheme: dark) {
        button { background: #222; color: #eee; border-color: #555; }
        button:hover { background: #333; }
        .panel { background: #1a1a1a; border-color: #333; }
        input, textarea { background: #1a1a1a; color: #eee; border-color: #555; }
      }
    </style>
  </head>
  <body>
    <h1>Circle Push — Sample</h1>
    <p class="muted">
      Enter an email or phone number, then click <b>Sign in &amp; enable notifications</b>.
    </p>

    <div id="config-error" class="panel" hidden style="border-color:#c33;color:#c33;"></div>

    <div class="panel">
      <label>Email</label>
      <input id="email" placeholder="user@example.com" />

      <label>Phone</label>
      <input id="phone" placeholder="+254712345678" />
    </div>

    <div class="row">
      <button id="btn-identify">Sign in &amp; enable notifications</button>
      <button id="btn-unregister">Disable notifications</button>
    </div>

    <div class="panel">
      <div class="grid">
        <b>SDK version</b><span id="s-version">—</span>
        <b>Permission</b><span id="s-permission">—</span>
        <b>Token</b><span id="s-token">—</span>
        <b>Device ID</b><span id="s-device">—</span>
        <b>Contact ID</b><span id="s-contact">—</span>
      </div>
    </div>

    <pre id="log"></pre>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
